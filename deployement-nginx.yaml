apiVersion:  apps/v1
kind:  Deployment
metadata:
  labels:
    app:  ey-cart-deployment
  name:  ey-cart-deployment
  namespace:  iyas-ns
spec: 
  replicas:  3
  selector:
    matchLabels:  
      app:  ey-cart
  template:
    metadata:
      labels:
        app:  ey-cart
    spec:
      containers:
        - name: cart-cont
          image:  muralisocial123/flipkart-app-web:v1.1.0
          ports:
            - containerPort: 80