apiVersion:  apps/v1
kind:  ReplicaSet
metadata: 
  name: ey-cart-rs 
  namespace: iyas-ns
  labels:
    app: cart
spec: #This first spec defines behaviour of replica set
  replicas:  3
  selector:  #It defines how the replicasets find which pods to manage
    matchLabels:
      app: web
  template:  #It contains pod definition
    metadata:
      labels:
        app:  web
    spec:  #It contains the container definition
      containers:
        - name:  ey-cart-container
          image:  muralisocial123/ey-cart:v1.1.0
          ports:
            - containerPort: 3000
